name: CI / Linter

on:
  push:
    branches: [ main, part1, feature/*, parser_and_ast ]
  pull_request:
    branches: [ main, part1, part2 ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8==7.0.0

    - name: Run flake8 linter
      run: |
        echo "Running flake8..."
        flake8 src/ tests/ --max-line-length=100 --count --statistics --show-source
        echo "flake8 passed!"