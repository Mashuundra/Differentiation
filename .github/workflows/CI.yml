name: CI / Linter and Tests

on:
  push:
    branches: [ main, part1, feature/*, parser_and_ast, parse_ast ]
  pull_request:
    branches: [ main, part1 ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==7.0.0
        pip install pytest==7.4.3

    - name: Run flake8 linter
      run: |
        flake8 src/ tests/ --max-line-length=100 --count --statistics --show-source

    - name: Run pytest
      run: |
        pytest tests/ -v